<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#064e3b" />
    <title>You're offline · DormDrop</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #fafaf9;
        color: #1c1917;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .card { max-width: 360px; text-align: center; }
      .mark {
        width: 64px; height: 64px; border-radius: 16px; margin: 0 auto 20px;
        background: #064e3b; display: flex; align-items: center; justify-content: center;
        font-size: 32px;
      }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { color: #57534e; line-height: 1.5; margin: 0 0 24px; }
      button {
        appearance: none; border: 0; cursor: pointer;
        background: #064e3b; color: #fff; font-weight: 600; font-size: 15px;
        padding: 12px 20px; border-radius: 12px;
      }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark">💧</div>
      <h1>You're offline</h1>
      <p>DormDrop needs a connection to find runners and place orders. Check your
        signal and try again.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
